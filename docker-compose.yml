services:
  kafka:
    image: apache/kafka:3.8.1
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: gtterfd
      POSTGRES_DB: users
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d users"]
      interval: 5s
      timeout: 5s
      retries: 5

  users-api:
    build:
      context: src
      dockerfile: Users/Dockerfile
    ports:
      - "5139:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=users-db;Port=5432;Database=users;Username=backend;Password=gtterfd
      JwtSettings__Secret: yp-events-api-dev-secret-key-min-32-chars
      JwtSettings__Issuer: EventsApi
      JwtSettings__Audience: EventsApi
      JwtSettings__ExpirationMinutes: 15
      KafkaSettings__BootstrapServers: kafka:29092
    depends_on:
      users-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  events-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: gtterfd
      POSTGRES_DB: events
    ports:
      - "5434:5432"
    volumes:
      - events-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d events"]
      interval: 5s
      timeout: 5s
      retries: 5

  events-api:
    build:
      context: src
      dockerfile: Events/Dockerfile
    ports:
      - "5133:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=events-db;Port=5432;Database=events;Username=backend;Password=gtterfd
      JwtSettings__Secret: yp-events-api-dev-secret-key-min-32-chars
      JwtSettings__Issuer: EventsApi
      JwtSettings__Audience: EventsApi
      JwtSettings__ExpirationMinutes: 15
      KafkaSettings__BootstrapServers: kafka:29092
    depends_on:
      events-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  bookings-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: gtterfd
      POSTGRES_DB: bookings
    ports:
      - "5433:5432"
    volumes:
      - bookings-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d bookings"]
      interval: 5s
      timeout: 5s
      retries: 5

  bookings-api:
    build:
      context: src
      dockerfile: Bookings/Dockerfile
    ports:
      - "5140:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=bookings-db;Port=5432;Database=bookings;Username=backend;Password=gtterfd
      JwtSettings__Secret: yp-events-api-dev-secret-key-min-32-chars
      JwtSettings__Issuer: EventsApi
      JwtSettings__Audience: EventsApi
      JwtSettings__ExpirationMinutes: 15
      KafkaSettings__BootstrapServers: kafka:29092
    depends_on:
      bookings-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  users-db-data:
  events-db-data:
  bookings-db-data:
