services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: gtterfd
      POSTGRES_DB: users
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d users"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: Users/Dockerfile
    ports:
      - "5139:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=users;Username=backend;Password=gtterfd
      JwtSettings__Secret: yp-events-api-dev-secret-key-min-32-chars
      JwtSettings__Issuer: EventsApi
      JwtSettings__Audience: EventsApi
      JwtSettings__ExpirationMinutes: 15
    depends_on:
      db:
        condition: service_healthy

volumes:
  users-db-data:
